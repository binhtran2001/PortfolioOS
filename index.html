<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="vi-container" style="display:none">
            <div id="vi-statusbar"></div>
            <textarea id="vi-editor" spellcheck="false"></textarea>
            <div id="vi-bar">
                <span id="vi-prompt">:</span>
                <input type="text" id="vi-input" spellcheck="false">
            </div>
        </div>
        <div id="input-line">
            <span id="prompt">guest@portfolio:~$ </span>
            <input type="text" id="command-input" autofocus spellcheck="false">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
